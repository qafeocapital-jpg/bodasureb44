    <meta property="og:description" content="BodaSure connects county governments, SACCOs, and 2.5 million riders on one platform — bringing digital permits, fair revenue collection, and financial access to Kenya's largest informal industry." />

    <meta name="twitter:card" content="summary_large_image" />

    <style>
      /* Hide Reamaze default floating launcher button — chat panel remains openable via _support.openChat() */
      .reamaze-launcher,
      #reamaze-launcher,
      .reamaze-widget-launcher,
      .reamaze-widget-button,
      .rmz-launcher,
      .rmz-widget-button,
      [class*='reamaze'][class*='launcher'],
      [class*='reamaze'][class*='button'],
      [id*='reamaze'][id*='launcher'],
      [class*='rmz-'],
      iframe[src*='reamaze.com'][title*='chat' i],
      div[data-reamaze] {
        display: none !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Reamaze Live Chat -->
    <script type="text/javascript" async src="https://cdn.reamaze.com/assets/reamaze-loader.js"></script>
    <script type="text/javascript">
      var _support = _support || { 'ui': {}, 'user': {} };
      _support['account'] = 'bodasure';
      _support['ui']['contactMode'] = 'mixed';
      _support['ui']['enableKb'] = 'true';
      _support['ui']['styles'] = {
        widgetColor: 'rgb(243, 164, 11)',
        gradient: true,
      };
      _support['ui']['shoutboxFacesMode'] = 'brand-avatar';
      _support['ui']['shoutboxHeaderLogo'] = true;
      _support['ui']['widget'] = {
        icon: 'webChat',
        displayOn: 'none',
        fontSize: 'default',
        allowBotProcessing: true,
        slug: 'bodasure-live-chat',
        label: {
          text: 'Let us know if you have any questions! &#128522;',
          mode: "none",
          delay: 3,
          duration: 30,
        },
        position: 'bottom-right',
        mobilePosition: 'bottom-right'
      };
      _support['custom_fields'] = {
        'Phone Number': {
          pos: 1782565278080,
          type: 'phone',
          value: '',
          required: true,
          placeholder: 'Enter your phone number',
          connectContact: true,
        }
      };
      _support['apps'] = {
        faq: {"enabled":true},
        recentConversations: {},
        orders: {},
        shopper: {}
      };
      _support['ui']['appOrder'] = ["faq","orders","shopper","recentConversations"];
    </script>
  </body>
</html>
